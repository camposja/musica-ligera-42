# =============================================================================
# Música Ligera 42 — Fly.io config (single machine, single SQLite volume).
#
# Operator rules — all four are load-bearing for DB persistence:
#   1. Never run more than one machine. SQLite has one writer; multi-machine
#      against the same volume = corruption.
#      Lock with: fly scale count 1 --max-per-region 1
#   2. Never run `prisma migrate reset` against /data/musica-ligera.sqlite —
#      it drops all data. Use `prisma migrate deploy` only.
#   3. Never delete the Fly volume named `data`. The DB lives on it.
#   4. Back up before any risky deploy or migration:
#        fly ssh console -C "/usr/local/bin/backup-db"        (in-volume; convenience)
#        fly volumes snapshots create <vol-id>                (off-volume; disaster recovery)
#
# See README "Deploy" section for the persistence-guarantees runbook.
# =============================================================================

app = "musica-ligera"
primary_region = "dfw"

[build]

[deploy]
  # "immediate" replaces the running machine in place. The default "rolling"
  # strategy can briefly run a transient second machine that contends for the
  # /data volume — fine for stateless apps, dangerous for plain SQLite.
  # Belt-and-suspenders ONLY: the real safety guarantee is the single-machine
  # constraint (rule 1 above). If a future Fly CLI rejects this value,
  # delete this block — it's not load-bearing.
  strategy = "immediate"

[env]
  # On-disk path to the SQLite file inside the persistent volume.
  # Not a secret — mounted at /data via the [[mounts]] block below.
  DATABASE_URL = "file:/data/musica-ligera.sqlite"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  # Auto-stop saves money on idle. Cold-start is ~5-15s on the first request
  # after stop. In-memory caches (audio resolver, etc.) reset on every wake —
  # fine for personal use.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

# Persistent volume — created once via:
#   fly volumes create data --size 1 --region dfw
# Fly volumes survive `fly deploy` (machines come and go; the volume persists).
[[mounts]]
  source = "data"
  destination = "/data"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
